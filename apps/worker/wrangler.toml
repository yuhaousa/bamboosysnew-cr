name = "bamboosys-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "bamboosys-db"
database_id = "YOUR_D1_DATABASE_ID"
migrations_dir = "../../migrations"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "bamboosys-media"
preview_bucket_name = "bamboosys-media-preview"

[dev]
port = 8000

[vars]
MEDIA_BASE_URL = "http://localhost:8000/api/media/file"
ADMIN_ORIGIN = "http://localhost:8001"
FRONTEND_ORIGIN = "http://localhost:8002"
ADMIN_EMAIL = "admin@example.com"
ADMIN_PASSWORD = "changeme123"
JWT_SECRET = "CHANGE_THIS_TO_A_RANDOM_SECRET_AT_LEAST_32_CHARS"
